<!--
  ═══════════════════════════════════════════════════════════════════════════
  Agora Homepage · Junior-pass assumptions (2026-04-23)
  Design by Huashu-Design · editorial/magazine direction

  Direction     · Anthropic-scholarly editorial tone. Claude Parchment system
                  (extracted from Agora src/index.css) drives every token.
                  No imagery, no screenshots — typography and rhythm carry
                  the whole page.

  Typography    · Fraunces (Google Fonts, opsz variable axis 9-144) for
                  display headlines — the 144 opsz setting gives the Hero
                  a proper editorial display cut instead of a body-text
                  serif blown up large.
                · Georgia for body (matches Agora App's runtime serif).
                · system-ui for UI elements (buttons, nav, mono-ish data).
                · Geist Mono / SF Mono fallback for file tree + version badges.

  Color system  · :root light tokens mirror App exactly (#f5f4ed parchment,
                  #c96442 terracotta, #141413 near-black, #e8e6dc warm sand).
                · .dark mirrors App (#141413 near-black, #d97757 coral).
                · Terracotta is the ONLY accent — no gradients, no secondary
                  decorative colours.

  Hero anchor   · "Stay in One." — the italic "One." carries 120% of the
                  page's visual weight; everything else ≤ 80%. This is the
                  one place we spend the typographic budget.

  Slogan double · Agora (ancient Greek άγορά = the gathering place) +
                  "Stay in One" (all your AI under one local roof). The
                  etymology is whispered in the footer, not shouted.

  Five layers   · Numbered I./II./III./IV./V. (Roman), editorial list, not
                  a feature grid — matches Anthropic/NYer/Stripe Press voice.

  Download CTA  · Real version pulled from package.json (0.1.0-alpha.1),
                  real GitHub URL (islgl/agora), real .dmg path. No mock.

  Screenshots   · INTENTIONALLY OMITTED per brief. The page relies on
                  composition + language; it is not a typical SaaS landing
                  with screenshots. This is a design risk the user chose.

  What's next   · This is Junior-pass final render. Polish happens on top:
                  paper-grain texture, scroll-reveal micro-motion, dark
                  toggle, and Playwright verify.
  ═══════════════════════════════════════════════════════════════════════════
-->

<style>
  /* ─── Tokens: mirror Agora App's Claude Parchment ─── */
  :root {
    --bg:              #f5f4ed;
    --card:            #faf9f5;
    --ink:             #141413;
    --ink-soft:        #4d4c48;
    --muted:           #87867f;
    --sand:            #e8e6dc;
    --sand-deep:       #e0ddd4;
    --cream:           #eeecea;
    --terracotta:      #c96442;
    --coral:           #d97757;
    --focus:           #3898ec;
    --plum:            #6e4a5a;

    --font-display:    'Fraunces', 'Newsreader', Georgia, 'Times New Roman', serif;
    --font-serif:      Georgia, 'Times New Roman', serif;
    --font-sans:       system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-mono:       'Geist Mono', 'SF Mono', 'Fira Code', ui-monospace, monospace;

    --radius-sm:       4px;
    --radius-md:       8px;
    --radius-lg:       12px;
    --radius-xl:       20px;

    --measure:         min(1280px, 100% - 3rem);
    --measure-narrow:  min(720px, 100% - 3rem);
  }

  html.dark {
    --bg:              #141413;
    --card:            #1f1e1d;
    --ink:             #faf9f5;
    --ink-soft:        #d5d2c6;
    --muted:           #8c8a81;
    --sand:            #30302e;
    --sand-deep:       #3d3d3a;
    --cream:           #1a1917;
    --terracotta:      #d97757;
    --coral:           #d97757;
    --plum:            #a68898;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  html {
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    scroll-behavior: smooth;
    /* Theme toggle smooths the parchment↔near-black swap so it feels like
       lamplight dimming rather than a hard page reload. */
    transition: background-color 0.35s ease, color 0.35s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    html { transition: none; }
  }

  body {
    font-family: var(--font-serif);
    line-height: 1.6;
    font-size: 16px;
    overflow-x: hidden;
  }

  /* Paper grain — extremely subtle, not a decorative texture. */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(20, 20, 19, 0.035) 1px, transparent 0);
    background-size: 3px 3px;
    pointer-events: none;
    mix-blend-mode: multiply;
    opacity: 0.7;
    z-index: 1;
  }
  html.dark body::before {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(250, 249, 245, 0.025) 1px, transparent 0);
    mix-blend-mode: screen;
    opacity: 1;
  }

  /* Make sure content sits above the grain */
  #root { position: relative; z-index: 2; }

  /* ─── Utility primitives ─── */
  .container {
    width: var(--measure);
    margin-inline: auto;
  }
  .container-narrow {
    width: var(--measure-narrow);
    margin-inline: auto;
  }

  /* Links */
  a { color: inherit; text-decoration: none; }
  a.link-underline {
    background-image: linear-gradient(currentColor, currentColor);
    background-size: 100% 1px;
    background-repeat: no-repeat;
    background-position: 0 100%;
    transition: background-size 0.3s ease;
  }
  a.link-underline:hover {
    background-size: 100% 2px;
  }

  /* ─── Top Nav ─── */
  .nav {
    position: sticky; top: 0;
    z-index: 50;
    background: color-mix(in oklab, var(--bg) 85%, transparent);
    backdrop-filter: saturate(1.1) blur(12px);
    -webkit-backdrop-filter: saturate(1.1) blur(12px);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s ease;
  }
  .nav[data-scrolled="true"] { border-bottom-color: var(--sand); }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 0;
  }
  .brand {
    display: inline-flex; align-items: center; gap: 0.55rem;
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 36;
    font-weight: 500;
    font-size: 1.3rem;
    letter-spacing: 0.005em;
    color: var(--ink);
    line-height: 1;
  }
  .brand img {
    width: 26px; height: 26px;
    object-fit: contain;
    filter: none;
    transition: transform 0.8s cubic-bezier(.2,.8,.2,1);
  }
  html.dark .brand img { filter: invert(1) hue-rotate(180deg) brightness(1.05); }
  .brand:hover img { transform: rotate(45deg); }
  .nav-links {
    display: flex; align-items: center; gap: 1.75rem;
    font-family: var(--font-sans);
    font-size: 0.88rem;
    color: var(--ink-soft);
  }
  .nav-links a { transition: color 0.2s ease; }
  .nav-links a:hover { color: var(--terracotta); }
  .nav-theme {
    font-family: var(--font-sans);
    font-size: 0.88rem;
    color: var(--ink-soft);
    background: transparent;
    border: 1px solid var(--sand-deep);
    border-radius: var(--radius-md);
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .nav-theme:hover {
    border-color: var(--terracotta);
    color: var(--terracotta);
  }

  /* ─── Hero ─── */
  .hero {
    position: relative;
    padding: 6rem 0 5rem;
    overflow: visible;
  }
  @media (min-width: 900px) {
    .hero { padding: 8rem 0 6rem; }
  }
  .hero-eyebrow {
    font-family: var(--font-sans);
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.2rem;
    display: inline-flex; align-items: center; gap: 0.7rem;
  }
  .hero-eyebrow .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--terracotta);
    display: inline-block;
  }
  .hero-display {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 144;
    color: var(--ink);
    margin: 0;
    line-height: 0.88;
    letter-spacing: -0.035em;
  }
  .hero-display .stay-in {
    font-weight: 400;
    font-size: clamp(3.5rem, 9vw, 8rem);
    display: block;
  }
  .hero-display .one {
    font-style: italic;
    font-weight: 400;
    font-variation-settings: 'opsz' 144;
    font-size: clamp(7rem, 18vw, 16rem);
    color: var(--terracotta);
    display: inline-block;
    margin-left: -0.02em;
    line-height: 0.85;
    padding-left: 0.02em;
  }
  .hero-display .one-dot {
    /* The full-stop after "One." — key editorial punctuation, slightly
       detached from the letterform. */
    color: var(--terracotta);
    font-style: normal;
  }

  .hero-sub {
    max-width: 38rem;
    margin-top: 2.5rem;
    font-family: var(--font-serif);
    font-size: clamp(1.05rem, 1.3vw, 1.2rem);
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .hero-sub em {
    font-style: italic;
    color: var(--ink);
  }

  .hero-meta {
    margin-top: 2.5rem;
    display: flex; flex-wrap: wrap; gap: 0.9rem;
    align-items: center;
  }

  /* Buttons */
  .btn {
    font-family: var(--font-sans);
    font-size: 0.92rem;
    font-weight: 500;
    padding: 0.85rem 1.4rem;
    border-radius: var(--radius-lg);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 0.6rem;
    text-decoration: none;
    letter-spacing: 0.005em;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
    box-shadow: 0 1px 2px rgba(20,20,19,0.07), 0 4px 12px -4px rgba(20,20,19,0.15);
  }
  html.dark .btn-primary {
    background: var(--ink);
    color: var(--bg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 12px -4px rgba(0,0,0,0.5);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 4px rgba(20,20,19,0.1), 0 8px 20px -4px rgba(20,20,19,0.2);
  }
  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border-color: var(--sand-deep);
  }
  .btn-secondary:hover {
    border-color: var(--ink);
    background: color-mix(in oklab, var(--ink) 4%, transparent);
  }
  .btn-arrow {
    transition: transform 0.25s ease;
    display: inline-block;
  }
  .btn:hover .btn-arrow { transform: translateX(3px); }

  /* Version badge next to buttons */
  .version-pill {
    font-family: var(--font-mono);
    font-size: 0.74rem;
    color: var(--muted);
    letter-spacing: 0.03em;
    padding-left: 0.4rem;
  }

  /* Hero compass — the logo at display scale, anchored quietly */
  .hero-compass {
    position: absolute;
    right: -2rem;
    top: 4rem;
    width: min(30vw, 22rem);
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
    filter: grayscale(1);
    animation: slow-spin 120s linear infinite;
  }
  html.dark .hero-compass {
    filter: grayscale(1) invert(1);
    opacity: 0.1;
  }
  @media (max-width: 900px) {
    .hero-compass { width: 50vw; right: -4rem; top: 6rem; opacity: 0.04; }
  }
  @keyframes slow-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero-compass { animation: none; }
  }

  .hero-body { position: relative; z-index: 1; }

  /* ─── Whisper (editorial quote) ─── */
  .whisper {
    padding: 5rem 0;
    border-top: 1px solid var(--sand);
  }
  .whisper-inner {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 2.5rem;
    align-items: baseline;
  }
  @media (max-width: 720px) {
    .whisper-inner { grid-template-columns: 1fr; gap: 1rem; }
  }
  .whisper-label {
    font-family: var(--font-sans);
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 0.6rem;
    white-space: nowrap;
  }
  .whisper-body {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 48;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1.5rem, 2.4vw, 2.2rem);
    line-height: 1.3;
    color: var(--ink);
    max-width: 38rem;
    letter-spacing: -0.01em;
  }
  .whisper-body .underline-ink {
    background-image: linear-gradient(var(--terracotta), var(--terracotta));
    background-size: 100% 2px;
    background-repeat: no-repeat;
    background-position: 0 90%;
    padding-bottom: 0.05em;
  }

  /* ─── What's inside — 5 layers as editorial entries ─── */
  .inside {
    padding: 6rem 0;
    border-top: 1px solid var(--sand);
  }
  .inside-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: end;
    margin-bottom: 4rem;
  }
  @media (max-width: 900px) {
    .inside-header { grid-template-columns: 1fr; gap: 1.5rem; }
  }
  .section-title {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 72;
    font-weight: 400;
    font-size: clamp(2.25rem, 4.5vw, 4rem);
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 0;
  }
  .section-title em {
    font-style: italic;
    color: var(--terracotta);
  }
  .section-intro {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    line-height: 1.65;
    color: var(--ink-soft);
    max-width: 32rem;
  }

  .layers {
    display: flex;
    flex-direction: column;
  }
  .layer {
    display: grid;
    grid-template-columns: 4rem 1fr 1.5fr;
    gap: 2.5rem;
    padding: 2.25rem 0;
    border-top: 1px solid var(--sand);
    align-items: baseline;
  }
  .layer:last-child { border-bottom: 1px solid var(--sand); }
  @media (max-width: 900px) {
    .layer { grid-template-columns: 3rem 1fr; row-gap: 0.75rem; }
    .layer-body { grid-column: 1 / -1; padding-left: 3rem; }
  }
  .layer-num {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 72;
    font-weight: 400;
    font-style: italic;
    font-size: 1.6rem;
    color: var(--terracotta);
    line-height: 1;
  }
  .layer-name {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 48;
    font-weight: 500;
    font-size: 1.6rem;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .layer-name small {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .layer-body {
    font-family: var(--font-serif);
    font-size: 1.02rem;
    line-height: 1.65;
    color: var(--ink-soft);
  }
  .layer-body em {
    color: var(--ink);
    font-style: italic;
  }

  /* ─── Everything local ─── */
  .local {
    padding: 6rem 0;
    border-top: 1px solid var(--sand);
  }
  .local-grid {
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 4rem;
    align-items: start;
  }
  @media (max-width: 900px) {
    .local-grid { grid-template-columns: 1fr; gap: 2.5rem; }
  }
  .local-title {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 72;
    font-weight: 400;
    font-size: clamp(2rem, 3.8vw, 3.25rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0 0 1.5rem;
  }
  .local-title em {
    font-style: italic;
    color: var(--terracotta);
  }
  .local-copy {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--ink-soft);
    max-width: 30rem;
  }
  .local-copy p + p { margin-top: 1rem; }
  .local-copy strong {
    color: var(--ink);
    font-weight: 500;
  }
  .filetree {
    background: var(--card);
    border: 1px solid var(--sand);
    border-radius: var(--radius-lg);
    padding: 1.5rem 1.75rem;
    font-family: var(--font-mono);
    font-size: 0.88rem;
    line-height: 1.85;
    color: var(--ink-soft);
    position: relative;
    overflow: hidden;
  }
  .filetree::before {
    content: '~/.agora/';
    display: block;
    font-family: var(--font-sans);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px dashed var(--sand-deep);
  }
  .filetree-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    align-items: baseline;
  }
  .filetree .path {
    color: var(--ink);
    font-weight: 500;
  }
  .filetree .gloss {
    color: var(--muted);
    font-family: var(--font-serif);
    font-size: 0.88rem;
    font-style: italic;
  }
  .filetree-row + .filetree-row {
    border-top: 1px solid var(--sand);
    padding-top: 0.55rem;
    margin-top: 0.1rem;
  }

  /* ─── Install section ─── */
  .install {
    padding: 6rem 0;
    border-top: 1px solid var(--sand);
  }
  .install-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 3rem;
  }
  .install-title {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 72;
    font-weight: 400;
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0 0 1.25rem;
  }
  .install-title em { font-style: italic; color: var(--terracotta); }
  .install-steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    counter-reset: step;
    margin-top: 1.5rem;
  }
  @media (max-width: 900px) {
    .install-steps { grid-template-columns: 1fr; gap: 1.25rem; }
  }
  .install-step {
    border-top: 1px solid var(--sand);
    padding-top: 1.5rem;
    counter-increment: step;
    position: relative;
  }
  .install-step::before {
    content: counter(step, decimal-leading-zero);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    display: block;
    margin-bottom: 0.75rem;
  }
  .install-step h4 {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 36;
    font-weight: 500;
    font-size: 1.1rem;
    margin: 0 0 0.75rem;
    color: var(--ink);
    letter-spacing: -0.005em;
  }
  .install-step p {
    font-family: var(--font-serif);
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--ink-soft);
    margin: 0;
  }
  .install-step code {
    font-family: var(--font-mono);
    font-size: 0.82rem;
    background: var(--card);
    border: 1px solid var(--sand);
    border-radius: var(--radius-sm);
    padding: 0.12rem 0.4rem;
    color: var(--plum);
  }
  html.dark .install-step code { color: var(--plum); }
  .install-note {
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px dashed var(--sand-deep);
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--muted);
    max-width: 42rem;
  }
  .install-note a {
    color: var(--terracotta);
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 3px;
  }
  .install-step a {
    color: var(--terracotta);
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 3px;
  }

  /* ─── Final CTA ─── */
  .cta {
    padding: 8rem 0 6rem;
    border-top: 1px solid var(--sand);
    text-align: center;
    position: relative;
  }
  .cta-title {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 144;
    font-weight: 400;
    font-size: clamp(3rem, 8vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin: 0 auto 1.5rem;
    max-width: 18em;
  }
  .cta-title em {
    font-style: italic;
    color: var(--terracotta);
  }
  .cta-sub {
    font-family: var(--font-serif);
    font-size: 1.1rem;
    color: var(--ink-soft);
    max-width: 34rem;
    margin: 0 auto 2.5rem;
    line-height: 1.6;
  }
  .cta-buttons {
    display: inline-flex; gap: 0.9rem; flex-wrap: wrap; justify-content: center;
  }

  /* ─── Footer ─── */
  .footer {
    padding: 3.5rem 0 2.5rem;
    border-top: 1px solid var(--sand);
    font-family: var(--font-sans);
    font-size: 0.85rem;
    color: var(--muted);
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 2rem;
    align-items: start;
    margin-bottom: 2.5rem;
  }
  @media (max-width: 900px) {
    .footer-grid { grid-template-columns: 1fr 1fr; }
  }
  .footer-col h5 {
    font-family: var(--font-sans);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 0.9rem;
    font-weight: 500;
  }
  .footer-col a {
    display: block;
    color: var(--ink-soft);
    padding: 0.2rem 0;
    transition: color 0.2s ease;
  }
  .footer-col a:hover { color: var(--terracotta); }
  .footer-etymology {
    font-family: var(--font-display);
    font-variation-settings: 'opsz' 36;
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    color: var(--ink-soft);
    line-height: 1.55;
    max-width: 24rem;
  }
  .footer-etymology .greek {
    font-style: normal;
    color: var(--terracotta);
    letter-spacing: 0.01em;
  }
  .footer-bottom {
    display: flex; flex-wrap: wrap; justify-content: space-between; gap: 1rem;
    padding-top: 2rem;
    border-top: 1px solid var(--sand);
  }
  .footer-bottom-right {
    display: flex; gap: 1.5rem; align-items: center;
  }

  /* ─── Scroll reveals ─── */
  .reveal {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.9s cubic-bezier(.2,.8,.2,1),
                transform 0.9s cubic-bezier(.2,.8,.2,1);
  }
  .reveal.in {
    opacity: 1;
    transform: translateY(0);
  }
  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; transition: none; }
  }

  /* Focus outline — Claude focus-blue */
  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
    border-radius: 4px;
  }

  /* Inline SVG icons (arrow, apple, github) */
  .i { width: 1em; height: 1em; display: inline-block; vertical-align: -0.1em; }

  /* Selection */
  ::selection { background: var(--terracotta); color: var(--bg); }

       1. window.__agoraInitialTheme already set (verification / host injects)
       2. ?theme=dark|light URL query (permalink)
       3. localStorage.agora-homepage-theme (returning user)
       4. prefers-color-scheme media query (first visit) -->
<script>
  (function () {
    try {
      var t = window.__agoraInitialTheme;
      if (t !== 'dark' && t !== 'light') {
        var q = new URLSearchParams(location.search).get('theme');
        if (q === 'dark' || q === 'light') {
          t = q;
        } else {
          var stored = localStorage.getItem('agora-homepage-theme');
          if (stored === 'dark' || stored === 'light') {
            t = stored;
          } else {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        }
      }
      if (t === 'dark') document.documentElement.classList.add('dark');
      window.__agoraInitialTheme = t;
    } catch (e) { /* no-op */ }
  })();
</script>
