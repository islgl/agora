<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Agora — a design system for the reading mind">
  <title>Agora</title>
  <!-- background: warm paper gradient -->
  <defs>
    <radialGradient id="bg" cx="20%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#e3dbc9"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- hairline top and bottom editorial rules -->
  <line x1="80" y1="60" x2="1120" y2="60" stroke="#c9bfa8" stroke-width="0.8"/>
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#c9bfa8" stroke-width="0.8"/>

  <!-- small caps eyebrow -->
  <text x="80" y="42"
        font-family="'Cormorant SC','Cormorant Garamond',serif"
        font-size="14" fill="#6b6254"
        letter-spacing="0.3em">A DESIGN SYSTEM · FOR THE READING MIND</text>

  <!-- small caps bottom line -->
  <text x="80" y="605"
        font-family="'Cormorant SC','Cormorant Garamond',serif"
        font-size="12" fill="#9a9081"
        letter-spacing="0.3em">MMXXVI · VOL. I</text>
  <text x="1120" y="605" text-anchor="end"
        font-family="'Cormorant SC','Cormorant Garamond',serif"
        font-size="12" fill="#9a9081"
        letter-spacing="0.3em">AGORA.DESIGN</text>

  <!-- mark on the left -->
  <g transform="translate(300,315) scale(1.6)">
    <g fill="#1f1b15">
      <g id="LL">
        <path d="M 0,-14 C 7,-42 7,-64 0,-84 C -7,-64 -7,-42 0,-14 Z"/>
      </g>
      <use href="#LL"/>
      <use href="#LL" transform="rotate(90)"/>
      <use href="#LL" transform="rotate(180)"/>
      <use href="#LL" transform="rotate(270)"/>
      <g id="SS">
        <path d="M 0,-12 C 5,-30 5,-46 0,-58 C -5,-46 -5,-30 0,-12 Z"/>
      </g>
      <use href="#SS" transform="rotate(45)"/>
      <use href="#SS" transform="rotate(135)"/>
      <use href="#SS" transform="rotate(225)"/>
      <use href="#SS" transform="rotate(315)"/>
    </g>
    <circle r="5" fill="#6e2f3a"/>
  </g>

  <!-- vertical hairline separator -->
  <line x1="560" y1="180" x2="560" y2="450" stroke="#c9bfa8" stroke-width="0.8"/>

  <!-- wordmark on the right -->
  <text x="610" y="340"
        font-family="'Cormorant Garamond','EB Garamond',Georgia,serif"
        font-size="148" font-weight="500" fill="#1f1b15"
        letter-spacing="0.005em">Agora</text>

  <!-- Greek + small-caps tagline -->
  <text x="612" y="395"
        font-family="'GFS Didot','EB Garamond',serif"
        font-size="40" font-style="italic" fill="#6e2f3a">ἀγορά</text>
  <text x="712" y="392"
        font-family="'Cormorant SC','Cormorant Garamond',serif"
        font-size="18" fill="#6b6254"
        letter-spacing="0.22em">· THE READING MIND</text>

  <!-- tagline paragraph, editorial serif italic -->
  <text x="612" y="445"
        font-family="'EB Garamond',Georgia,serif"
        font-size="22" font-style="italic" fill="#3a342a">A humanist theme for long-form thought.</text>
</svg>
